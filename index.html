<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Sudeep's Blogs</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f8fafc;
  color: #0f172a;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

header {
  margin-bottom: 30px;
}

h1 {
  margin: 0;
}

.blog-card {
  display: block;
  padding: 20px;
  margin-bottom: 16px;
  border-radius: 12px;
  background: white;
  border: 1px solid #e2e8f0;
  text-decoration: none;
  color: inherit;
  transition: 0.2s;
}

.blog-card:hover {
  transform: translateY(-2px);
  border-color: #2563eb;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.blog-card h2 {
  margin: 0 0 8px;
}

.blog-card p {
  margin: 0;
  color: #64748b;
}

.back {
  display: inline-block;
  margin-bottom: 20px;
  text-decoration: none;
  color: #2563eb;
  font-weight: bold;
}

iframe {
  width: 100%;
  height: 90vh;
  border: none;
  border-radius: 12px;
}

article {
  background: white;
  padding: 30px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

    title: "Event Loop From First Principles",

    app.innerHTML = `<p>Blog not found</p>`;
    return;

      <a class="back" hrefiframe src="${blog.file} `;
